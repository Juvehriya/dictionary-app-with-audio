<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictionary App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:600px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.search-box{
    display:flex;
    gap:10px;
}

.search-box input{
    flex:1;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

.search-box button{
    padding:12px 18px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.search-box button:hover{
    background:#0056b3;
}

.controls{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.controls button{
    flex:1;
    padding:10px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.controls button:hover{
    background:#1e7e34;
}

.result{
    margin-top:25px;
}

.result h2{
    color:#222;
    margin-bottom:10px;
}

.result p{
    margin-bottom:10px;
    line-height:1.6;
}

.error{
    color:red;
    font-weight:bold;
}

@media(max-width:600px){

    .search-box{
        flex-direction:column;
    }

    .controls{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>📖 Dictionary App</h1>

    <div class="search-box">
        <input type="text" id="wordInput" placeholder="Enter a word...">
        <button onclick="searchWord()">Search</button>
    </div>

    <div class="controls">
        <button onclick="playAudio()">🔊 Pronunciation</button>
        <button onclick="speakWord()">🗣 Speak Word</button>
    </div>

    <div class="result" id="result">
        Search a word to see its meaning.
    </div>

</div>

<script>

let audioLink = "";
let currentWord = "";

async function searchWord(){

    const word = document.getElementById("wordInput").value.trim();
    const result = document.getElementById("result");

    if(word === ""){
        alert("Please enter a word");
        return;
    }

    currentWord = word;

    try{

        const response = await fetch(
            `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`
        );

        const data = await response.json();

        if(data.title){
            throw new Error("Word not found");
        }

        const meaning =
            data[0].meanings[0].definitions[0].definition;

        const partOfSpeech =
            data[0].meanings[0].partOfSpeech;

        const phonetic =
            data[0].phonetic || "Not Available";

        audioLink = "";

        for(let item of data[0].phonetics){
            if(item.audio){
                audioLink = item.audio;
                break;
            }
        }

        result.innerHTML = `
            <h2>${data[0].word}</h2>
            <p><strong>Phonetic:</strong> ${phonetic}</p>
            <p><strong>Part of Speech:</strong> ${partOfSpeech}</p>
            <p><strong>Meaning:</strong> ${meaning}</p>
        `;

    }
    catch(error){

        result.innerHTML = `
            <p class="error">❌ Word not found.</p>
        `;
    }
}

function playAudio(){

    if(audioLink){
        const audio = new Audio(audioLink);
        audio.play();
    }
    else{
        alert("Pronunciation audio not available.");
    }
}

function speakWord(){

    if(currentWord === ""){
        alert("Search a word first.");
        return;
    }

    const speech = new SpeechSynthesisUtterance(currentWord);

    speech.lang = "en-US";
    speech.rate = 1;
    speech.pitch = 1;

    window.speechSynthesis.speak(speech);
}

document.getElementById("wordInput")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        searchWord();
    }
});

</script>

</body>
</html>
